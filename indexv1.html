<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.hidden { display: none; }</style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-slate-900 p-4 text-white shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter cursor-pointer" onclick="showPage('home')">LEAGUE<span class="text-yellow-400">STATS</span></h1>
            <div id="navControls">
                <button id="loginBtn" onclick="showPage('login')" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition">Admin Login</button>
                <button id="logoutBtn" onclick="logout()" class="hidden bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition">Logout</button>
            </div>
        </div>
    </nav>

    <main id="home" class="max-w-6xl mx-auto p-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-4xl font-extrabold text-slate-800">Current Season</h2>
                <p class="text-slate-500" id="currentSeasonDisplay">Loading season...</p>
            </div>
            <button class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2 rounded-full font-bold transition">View Past Seasons</button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <h3 class="text-xl font-bold mb-4 flex items-center"><span class="w-2 h-6 bg-yellow-400 mr-2 rounded"></span> Recent Match Scores</h3>
                <div id="matchContainer" class="space-y-4"></div>
            </div>
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold mb-4">🔥 Top Scorers</h3>
                    <ul id="topScorersList" class="space-y-3"></ul>
                </div>
            </div>
        </div>
    </main>

    <section id="login" class="hidden min-h-[80vh] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <h2 class="text-3xl font-bold mb-6 text-center">Admin Access</h2>
            <div class="space-y-4">
                <input type="text" id="uid" class="w-full border border-slate-300 p-3 rounded-xl outline-none" placeholder="Username">
                <input type="password" id="pwd" class="w-full border border-slate-300 p-3 rounded-xl outline-none" placeholder="Password">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Verify Identity</button>
                <button onclick="showPage('home')" class="w-full text-slate-500 text-sm">Cancel</button>
            </div>
        </div>
    </section>

    <section id="adminDash" class="hidden max-w-4xl mx-auto p-6">
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
            <h2 class="text-3xl font-bold mb-8 text-center">Add Match Result</h2>
            
            <div class="mb-6">
                <label class="block font-bold mb-2">Select Season</label>
                <select id="seasonSelect" class="w-full border p-3 rounded-xl bg-slate-50"></select>
            </div>

            <div class="grid md:grid-cols-2 gap-8 border-b pb-8">
                <div class="p-4 bg-blue-50 rounded-xl">
                    <h4 class="font-bold text-blue-800 mb-3 text-center underline">Home Team</h4>
                    <input type="text" id="t1Name" placeholder="Team Name" class="w-full p-2 mb-2 rounded border">
                    <input type="number" id="t1Score" placeholder="Full Time Goals" class="w-full p-2 mb-2 rounded border">
                    <textarea id="t1Scorers" placeholder="Scorers (One per line)" class="w-full p-2 h-20 rounded border"></textarea>
                </div>
                <div class="p-4 bg-red-50 rounded-xl">
                    <h4 class="font-bold text-red-800 mb-3 text-center underline">Away Team</h4>
                    <input type="text" id="t2Name" placeholder="Team Name" class="w-full p-2 mb-2 rounded border">
                    <input type="number" id="t2Score" placeholder="Full Time Goals" class="w-full p-2 mb-2 rounded border">
                    <textarea id="t2Scorers" placeholder="Scorers (One per line)" class="w-full p-2 h-20 rounded border"></textarea>
                </div>
            </div>

            <div class="mt-6 p-4 bg-gray-100 rounded-xl">
                <label class="flex items-center gap-2 font-bold cursor-pointer">
                    <input type="checkbox" id="isPens" onchange="togglePens()"> Match decided by penalties?
                </label>
                <div id="penInput" class="hidden grid grid-cols-2 gap-4 mt-4">
                    <input type="number" id="t1Pens" placeholder="Home Pens Scored" class="w-full p-2 rounded border">
                    <input type="number" id="t2Pens" placeholder="Away Pens Scored" class="w-full p-2 rounded border">
                </div>
            </div>

            <button onclick="saveMatch()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black text-xl shadow-lg">SAVE MATCH DATA</button>
        </div>
    </section>

    <script>
        let matches = JSON.parse(localStorage.getItem('league_matches_v2')) || [];
        let seasons = JSON.parse(localStorage.getItem('league_seasons')) || ["Season 2026", "Season 2025"];
        let isAdmin = false;

        function togglePens() {
            document.getElementById('penInput').classList.toggle('hidden', !document.getElementById('isPens').checked);
        }

        function showPage(pageId) {
            document.querySelectorAll('main, section').forEach(el => el.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            if(pageId === 'home') renderHome();
            if(pageId === 'adminDash') updateSeasonDropdown();
        }

        function handleLogin() {
            if(document.getElementById('uid').value === 'admin' && document.getElementById('pwd').value === 'admin123') {
                isAdmin = true;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                showPage('adminDash');
            } else { alert('Wrong Credentials'); }
        }

        function logout() { isAdmin = false; location.reload(); }

        function updateSeasonDropdown() {
            const select = document.getElementById('seasonSelect');
            select.innerHTML = seasons.map(s => `<option value="${s}">${s}</option>`).join('') + `<option value="NEW">➕ Add New Season...</option>`;
            select.onchange = (e) => {
                if(e.target.value === 'NEW') {
                    const name = prompt("Season Name:");
                    if(name) { seasons.unshift(name); localStorage.setItem('league_seasons', JSON.stringify(seasons)); updateSeasonDropdown(); }
                }
            };
        }

        function saveMatch() {
            const matchData = {
                id: Date.now(),
                season: document.getElementById('seasonSelect').value,
                t1: { name: document.getElementById('t1Name').value, score: document.getElementById('t1Score').value || 0, scorers: document.getElementById('t1Scorers').value.split('\n').filter(s => s.trim()) },
                t2: { name: document.getElementById('t2Name').value, score: document.getElementById('t2Score').value || 0, scorers: document.getElementById('t2Scorers').value.split('\n').filter(s => s.trim()) },
                pens: document.getElementById('isPens').checked ? { t1: document.getElementById('t1Pens').value, t2: document.getElementById('t2Pens').value } : null
            };

            if(!matchData.t1.name || !matchData.t2.name) return alert("Fill team names!");
            matches.unshift(matchData);
            localStorage.setItem('league_matches_v2', JSON.stringify(matches));
            location.reload();
        }

        function deleteMatch(id) {
            if(confirm("Delete match?")) { matches = matches.filter(m => m.id !== id); localStorage.setItem('league_matches_v2', JSON.stringify(matches)); renderHome(); }
        }

        function renderHome() {
            const container = document.getElementById('matchContainer');
            const scorerList = document.getElementById('topScorersList');
            document.getElementById('currentSeasonDisplay').innerText = seasons[0];

            container.innerHTML = matches.map(m => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border relative group">
                    ${isAdmin ? `<button onclick="deleteMatch(${m.id})" class="absolute top-4 right-4 text-red-500 font-bold opacity-0 group-hover:opacity-100 transition">Delete</button>` : ''}
                    <div class="text-xs font-bold text-slate-400 mb-2">${m.season}</div>
                    <div class="flex items-center justify-between">
                        <div class="flex-1 text-center font-bold text-lg">${m.t1.name}<div class="text-xs font-normal text-slate-400">${m.t1.scorers.join(', ')}</div></div>
                        <div class="px-4 text-center">
                            <div class="text-3xl font-black">${m.t1.score} - ${m.t2.score}</div>
                            ${m.pens ? `<div class="text-blue-600 font-bold text-sm">(${m.pens.t1} - ${m.pens.t2} pens)</div>` : ''}
                        </div>
                        <div class="flex-1 text-center font-bold text-lg">${m.t2.name}<div class="text-xs font-normal text-slate-400">${m.t2.scorers.join(', ')}</div></div>
                    </div>
                </div>
            `).join('');

            let scores = {};
            matches.forEach(m => [...m.t1.scorers, ...m.t2.scorers].forEach(n => scores[n.trim()] = (scores[n.trim()] || 0) + 1));
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]).slice(0, 10);
            scorerList.innerHTML = sorted.map(([name, count]) => `<li class="flex justify-between p-2 hover:bg-slate-50 rounded"><span>${name}</span><span class="font-bold">${count} Goals</span></li>`).join('');
        }

        renderHome();
    </script>
</body>
</html>
